<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV.js リアルタイムカメラ処理サンプル</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        /* カメラ入力（非表示にしてOpenCVの処理ソースとして使う） */
        #video-input {
            display: none;
        }
        /* 処理結果を表示するキャンバス */
        canvas {
            width: 100%;
            max-width: 500px;
            border: 3px solid #333;
            border-radius: 8px;
            background-color: #000;
        }
        .button-group {
            margin: 20px 0;
        }
        button {
            padding: 10px 15px;
            font-size: 14px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #e0e0e0;
            transition: 0.2s;
        }
        button:hover {
            background-color: #ccc;
        }
        button.active {
            background-color: #007bff;
            color: white;
        }
        #status {
            font-weight: bold;
            color: #ff5722;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OpenCV.js カメラ処理</h1>
    <p id="status">OpenCV.js を読み込み中...</p>

    <div class="button-group">
        <button id="btn-normal" class="active" disabled>通常</button>
        <button id="btn-gray" disabled>グレースケール</button>
        <button id="btn-edge" disabled>エッジ検出</button>
        <button id="btn-thresh" disabled>二値化</button>
    </div>

    <canvas id="canvas-output"></canvas>

    <video id="video-input" autoplay playsinline></video>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>

<script>
    const video = document.getElementById('video-input');
    const canvas = document.getElementById('canvas-output');
    const statusText = document.getElementById('status');
    
    // 処理モードの状態管理 ('normal', 'gray', 'edge', 'thresh')
    let currentMode = 'normal'; 
    let isStreaming = false;

    // OpenCV.jsの読み込み完了時に呼ばれるフック
    var Module = {
        onRuntimeInitialized: function() {
            statusText.innerText = "OpenCV.js 準備完了！カメラを起動します...";
            statusText.style.color = "green";
            startCamera();
        }
    };

    // カメラの起動
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, facingMode: "user" },
                audio: false
            });
            video.srcObject = stream;
            video.addEventListener('canplay', () => {
                if (!isStreaming) {
                    // キャンバスのサイズをビデオの解像度に合わせる
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    isStreaming = true;
                    enableButtons();
                    // リアルタイム処理ループを開始
                    statusText.innerText = "リアルタイム処理中";
                    scheduleProcessing();
                }
            });
        } catch (err) {
            console.error("カメラの起動に失敗しました: ", err);
            statusText.innerText = "カメラの起動に失敗しました。";
            statusText.style.color = "red";
        }
    }

    // ボタンの有効化とイベント登録
    function enableButtons() {
        const modes = ['normal', 'gray', 'edge', 'thresh'];
        modes.forEach(mode => {
            const btn = document.getElementById(`btn-${mode}`);
            btn.disabled = false;
            btn.addEventListener('click', () => {
                // アクティブなボタンの見た目を切り替え
                modes.forEach(m => document.getElementById(`btn-${m}`).classList.remove('active'));
                btn.classList.add('active');
                // モード変更
                currentMode = mode;
            });
        });
    }

    // OpenCVを使った画像処理のループ
    function scheduleProcessing() {
        if (!isStreaming) return;

        // OpenCVの行列（Mat）オブジェクトの生成
        // src: 入力（RGBA）, dst: 出力用空バッファ
        let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
        let dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
        
        // 映像キャプチャ用のコンテキストを準備
        let cap = new cv.VideoCapture(video);

        const FPS = 30; // 目標フレームレート
        
        function processVideo() {
            try {
                if (!isStreaming) {
                    // メモリ解放
                    src.delete();
                    dst.delete();
                    return;
                }

                let begin = Date.now();
                
                // 現在のビデオフレームを src (Mat) に読み込む
                cap.read(src);

                // 選択されているモードに応じてOpenCVの関数を適用
                if (currentMode === 'normal') {
                    // 何もしない（そのまま表示）
                    cv.imshow('canvas-output', src);

                } else if (currentMode === 'gray') {
                    // グレースケール変換 (RGBA -> GRAY)
                    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                    cv.imshow('canvas-output', dst);

                } else if (currentMode === 'edge') {
                    // エッジ検出（Cannyアルゴリズム）のために一度グレーにしてから処理
                    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                    cv.Canny(dst, dst, 50, 100, 3, false);
                    cv.imshow('canvas-output', dst);

                } else if (currentMode === 'thresh') {
                    // 二値化処理 (グレー変換 -> 固定閾値での二値化)
                    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                    // 閾値128、最大値255で二値化 (THRESH_BINARY)
                    cv.threshold(dst, dst, 128, 255, cv.THRESH_BINARY);
                    cv.imshow('canvas-output', dst);
                }

                // 次のフレームの実行タイミングを計算 (30fpsを維持)
                let delay = 1000 / FPS - (Date.now() - begin);
                setTimeout(processVideo, Math.max(0, delay));

            } catch (err) {
                console.error("画像処理中にエラーが発生しました: ", err);
                // エラーが発生した場合はメモリを解放してループを止める
                src.delete();
                dst.delete();
            }
        }

        // ループを開始
        setTimeout(processVideo, 0);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV.js Camera Filters</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 100%;
        }
        .controls {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        button.active { background-color: #28a745; }
        
        #status {
            margin-bottom: 15px;
            font-weight: bold;
            color: #d9534f;
        }
        /* 元のビデオ入力は非表示にし、Canvasのみを表示する */
        #videoInput {
            display: none;
        }
        canvas {
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>リアルタイム画像処理</h2>
    <div id="status">OpenCV.js を読み込み中... (数秒かかります)</div>
    
    <div class="controls">
        <button id="btnStart" disabled>カメラ起動</button>
        <button id="btnOriginal" class="filter-btn active" data-filter="original" disabled>オリジナル</button>
        <button id="btnBilateral" class="filter-btn" data-filter="bilateral" disabled>カートゥーン</button>
        <button id="btnGray" class="filter-btn" data-filter="gray" disabled>グレースケール</button>
        <button id="btnBinary" class="filter-btn" data-filter="binary" disabled>２値化</button>
        <button id="btnEdge" class="filter-btn" data-filter="edge" disabled>エッジ抽出 (Canny)</button>
    </div>

    <video id="videoInput" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvasOutput" width="640" height="480"></canvas>
</div>

<script async src="opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

<script>
    let video = document.getElementById('videoInput');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let streaming = false;
    let currentFilter = 'original';
    // バイラテラル用に srcRGB, dstRGB を追加
    let src, dst, gray, srcRGB, dstRGB;
    let cap;

    // OpenCV.jsのロード完了時に呼ばれる関数
    function onOpenCvReady() {
        // cvモジュールが完全に初期化されるのを待つ
        cv['onRuntimeInitialized'] = () => {
            document.getElementById('status').textContent = 'OpenCV.js 読み込み完了。カメラを起動してください。';
            document.getElementById('status').style.color = '#5cb85c';
            document.getElementById('btnStart').disabled = false;
        };
    }

    // カメラの起動処理
    document.getElementById('btnStart').addEventListener('click', function() {
        if (!streaming) {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play();
                    streaming = true;
                    document.getElementById('btnStart').textContent = 'カメラ停止';
                    
                    // フィルタボタンを有効化
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.disabled = false);
                    document.getElementById('status').textContent = 'カメラ動作中';

                    // ビデオの再生開始を待ってから処理ループを開始
                    video.addEventListener('canplay', () => {
                        if(streaming) startVideoProcessing();
                    }, { once: true });
                })
                .catch(function(err) {
                    console.error("カメラの起動に失敗しました: " + err);
                    document.getElementById('status').textContent = "エラー: カメラへのアクセスが拒否されたか、見つかりません。";
                });
        } else {
            // カメラ停止処理
            let stream = video.srcObject;
            let tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
            video.srcObject = null;
            streaming = false;
            document.getElementById('btnStart').textContent = 'カメラ起動';
            document.getElementById('status').textContent = 'カメラ停止中';
            document.querySelectorAll('.filter-btn').forEach(btn => btn.disabled = true);
            
            // メモリの解放 (バイラテラル用Matも解放)
            if (src) src.delete();
            if (dst) dst.delete();
            if (gray) gray.delete();
            if (srcRGB) srcRGB.delete();
            if (dstRGB) dstRGB.delete();
        }
    });

    // フィルタ切り替えボタンのイベントリスナー
    document.querySelectorAll('.filter-btn').forEach(button => {
        button.addEventListener('click', function() {
            // 見た目のアクティブ状態を更新
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            // 現在のフィルタを更新
            currentFilter = this.getAttribute('data-filter');
        });
    });

    // 映像処理ループ
    function startVideoProcessing() {
        // メモリの確保 (バイラテラル用に3チャンネル(UC3)のMatを追加)
        src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
        dst = new cv.Mat(video.height, video.width, cv.CV_8UC1);
        gray = new cv.Mat(video.height, video.width, cv.CV_8UC1);
        srcRGB = new cv.Mat(video.height, video.width, cv.CV_8UC3);
        dstRGB = new cv.Mat(video.height, video.width, cv.CV_8UC3);
        cap = new cv.VideoCapture(video);

        const FPS = 30;

        function processVideo() {
            if (!streaming) return; // 停止時はループを抜ける

            let begin = Date.now();
            try {
                // ビデオフレームを src に読み込む
                cap.read(src);

                switch (currentFilter) {
                    case 'bilateral':
                        cv.cvtColor(src, srcRGB, cv.COLOR_RGBA2RGB); // RGBA から RGB に変換                 

                        let iterations = 3;
                        let inMat = srcRGB;
                        let outMat = dstRGB;
                        for (let i = 0; i < iterations; i++) {                           
                            cv.bilateralFilter(inMat, outMat, 9, 75, 100, cv.BORDER_DEFAULT);// 負荷を抑えるため直径 d=5、標準偏差=75                           
                            // 次のループのために、今回の出力を次の入力に入れ替える（ピンポンバッファ処理）
                            let temp = inMat;
                            inMat = outMat;
                            outMat = temp;
                        }               

                        // 輪郭描画
                        cv.cvtColor(inMat, gray, cv.COLOR_RGB2GRAY);
                        cv.Canny(gray, dst, 20, 60, 3, false);
                        let M = cv.Mat.ones(2, 2, cv.CV_8U); // 2x2のマス目で太くする
                        //cv.dilate(dst, dst, M);
                        M.delete(); // 使い終わったらメモリ解放
                        dstRGB.setTo(new cv.Scalar(0, 0, 0), dst);

                        // 画面に出力（最後のループで入れ替わっているため、最新結果は inMat に入っています）
                        cv.imshow('canvasOutput', inMat);
                        
                        break;

                    case 'gray':
                        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                        cv.imshow('canvasOutput', dst);
                        break;
                    
                    case 'binary':
                        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                        // 閾値128で2値化
                        cv.threshold(gray, dst, 128, 255, cv.THRESH_BINARY);
                        cv.imshow('canvasOutput', dst);
                        break;

                    case 'edge':
                        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                        // Canny法によるエッジ抽出 (閾値50, 100)
                        cv.Canny(gray, dst, 50, 100, 3, false);
                        cv.imshow('canvasOutput', dst);
                        break;

                    case 'original':
                    default:
                        cv.imshow('canvasOutput', src);
                        break;
                }

                // FPSを維持するための遅延計算
                let delay = 1000/FPS - (Date.now() - begin);
                setTimeout(processVideo, delay);

            } catch (err) {
                console.error(err);
                document.getElementById('status').textContent = "処理エラーが発生しました。";
            }
        }
        
        // 処理ループ開始
        setTimeout(processVideo, 0);
    }
</script>
</body>
</html>
